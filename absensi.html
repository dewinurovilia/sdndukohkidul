<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Absensi Siswa</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{

    background:#f4f6f9;
    font-family:Arial;

}

.card{

    border:none;

    border-radius:20px;

    box-shadow:0 4px 10px rgba(0,0,0,0.1);

}

#reader{

    width:100%;

}

</style>

</head>
<body>

<div class="container py-4">

    <div class="card p-4">

        <h2 class="text-center mb-4">
            ABSENSI SISWA
        </h2>

        <!-- PILIH KELAS -->

        <div class="mb-3">

            <label class="form-label">
                Pilih Kelas
            </label>

            <select
            id="kelas"
            class="form-select"
            >

                <option value="">
                    -- Pilih Kelas --
                </option>

                <option>Kelas 1</option>
                <option>Kelas 2</option>
                <option>Kelas 3</option>
                <option>Kelas 4</option>
                <option>Kelas 5</option>
                <option>Kelas 6</option>

            </select>

        </div>

        <!-- NAMA GURU -->

        <div class="mb-3">

            <label class="form-label">
                Nama Guru
            </label>

            <input
            type="text"
            id="guru"
            class="form-control"
            placeholder="Masukkan nama guru"
            >

        </div>

        <!-- TOMBOL -->

        <button
        class="btn btn-primary w-100 mb-4"
        onclick="mulaiAbsensi()"
        >

            Mulai Absensi

        </button>

        <!-- SCANNER -->

        <div id="reader"></div>

    </div>

</div>

<script>

const scriptURL =
'https://script.google.com/macros/s/AKfycbwicmFqIX_nvlchM0Jsjubk6EuUT1YkwdWtQViJK90hBbL94eseMpyZTCcevv-fzeM/exec';

let siswa = {

    "1001":"Ahmad",
    "1002":"Budi",
    "1003":"Citra",
    "1004":"Dewi"

};

let absensi = [];

function jam(){

    return new Date()
    .toLocaleTimeString();

}

function tanggal(){

    return new Date()
    .toLocaleDateString();

}

function mulaiAbsensi(){

    let kelas =
    document.getElementById("kelas").value;

    let guru =
    document.getElementById("guru").value;

    if(kelas == ""){

        alert("Pilih kelas");

        return;

    }

    if(guru == ""){

        alert("Masukkan nama guru");

        return;

    }

    const html5QrCode =
    new Html5Qrcode("reader");

    html5QrCode.start(

        { facingMode:"environment" },

        {
            fps:10,
            qrbox:250
        },

        (decodedText)=>{

            let nama =
            siswa[decodedText];

            if(!nama){

                alert("Siswa tidak ditemukan");

                return;

            }

            let sudah =
            absensi.find(
                x=>x.kode == decodedText
            );

            if(sudah){

                alert("Sudah absen");

                return;

            }

            let data = {

                no : absensi.length + 1,

                tanggal : tanggal(),

                kelas : kelas,

                guru : guru,

                nama : nama,

                jam : jam(),

                status : "Hadir"

            };

            absensi.push(data);

            kirimGoogleSheet(data);

            alert(
                nama +
                " berhasil absen"
            );

        }

    );

}

function kirimGoogleSheet(data){

    fetch(scriptURL,{

        method:"POST",

        body:JSON.stringify(data)

    })

    .then(res=>res.text())

    .then(res=>{

        console.log("Berhasil");

    })

    .catch(err=>{

        console.log(err);

    });

}

</script>

</body>
</html>
