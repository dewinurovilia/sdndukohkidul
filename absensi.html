<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Absensi Siswa</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{

    background:#f4f6f9;
    font-family:Arial;

}

/* SIDEBAR */

.sidebar{

    width:260px;
    height:100vh;

    background:#0d6efd;

    position:fixed;

    left:0;
    top:0;

    padding:20px;

    color:white;

    overflow:auto;

}

.logo{

    text-align:center;
    margin-bottom:30px;

}

.menu a{

    display:flex;
    align-items:center;
    gap:12px;

    text-decoration:none;

    color:white;

    padding:14px;

    border-radius:12px;

    margin-bottom:10px;

    transition:0.3s;

}

.menu a:hover{

    background:rgba(255,255,255,0.2);

}

.menu a.active{

    background:white;
    color:#0d6efd;

}

/* CONTENT */

.content{

    margin-left:280px;
    padding:30px;

}

.card-box{

    background:white;

    border-radius:20px;

    padding:25px;

    box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

</style>

</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">

        <h2>SD SCHOOL</h2>

        <p>Administrasi Sekolah</p>

    </div>

    <div class="menu">

        <a href="dashboard.html">

            <i class="fa-solid fa-house"></i>
            Dashboard

        </a>

        <a href="datasiswa.html">

            <i class="fa-solid fa-user-graduate"></i>
            Data Siswa

        </a>

        <a href="dataguru.html">

            <i class="fa-solid fa-chalkboard-user"></i>
            Data Guru

        </a>

        <a href="absensi.html" class="active">

            <i class="fa-solid fa-camera"></i>
            Absensi

        </a>

        <a href="nilai.html">

            <i class="fa-solid fa-chart-column"></i>
            Nilai

        </a>

    </div>

</div>

<!-- CONTENT -->

<div class="content">

    <div class="card-box">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h3>
                    Absensi Siswa
                </h3>

                <small>
                    Input kehadiran siswa
                </small>

            </div>

            <button
            class="btn btn-success"
            onclick="simpanAbsensi()"
            >

                Simpan Absensi

            </button>

        </div>

        <!-- PILIH KELAS -->

        <div class="mb-4">

            <label class="form-label">
                Pilih Kelas
            </label>

            <select
            id="kelas"
            class="form-select"
            onchange="loadSiswa()"
            >

                <option value="">
                    -- Pilih Kelas --
                </option>

                <option value="1">
                    Kelas 1
                </option>

                <option value="2">
                    Kelas 2
                </option>

                <option value="3">
                    Kelas 3
                </option>

                <option value="4">
                    Kelas 4
                </option>

                <option value="5">
                    Kelas 5
                </option>

                <option value="6">
                    Kelas 6
                </option>

            </select>

        </div>

        <!-- TABEL -->

        <div class="table-responsive">

            <table class="table table-bordered table-hover">

                <thead class="table-primary">

                    <tr>

                        <th>No</th>
                        <th>Nama Siswa</th>
                        <th>Status Kehadiran</th>
                        <th>Keterangan</th>

                    </tr>

                </thead>

                <tbody id="tbody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

/* URL GOOGLE SHEET */

const scriptURL =
'https://script.google.com/macros/s/AKfycbwicmFqIX_nvlchM0Jsjubk6EuUT1YkwdWtQViJK90hBbL94eseMpyZTCcevv-fzeM/exec';

/* DATA SISWA */

let dataSiswa = {

    1 : [
        "Ahmad",
        "Budi",
        "Citra"
    ],

    2 : [
        "Dewi",
        "Eka",
        "Farhan"
    ],

    3 : [
        "Gilang",
        "Hani"
    ],

    4 : [
        "Indra",
        "Joko"
    ],

    5 : [
        "Kiki",
        "Lina"
    ],

    6 : [
        "Maman",
        "Nisa"
    ]

};

/* LOAD SISWA */

function loadSiswa(){

    let kelas =
    document.getElementById("kelas").value;

    let tbody =
    document.getElementById("tbody");

    tbody.innerHTML = "";

    dataSiswa[kelas].forEach((nama,index)=>{

        tbody.innerHTML += `

        <tr>

            <td>${index+1}</td>

            <td>${nama}</td>

            <td>

                <select
                class="form-select status"
                >

                    <option>
                        Hadir
                    </option>

                    <option>
                        Tidak Hadir
                    </option>

                    <option>
                        Sakit
                    </option>

                    <option>
                        Izin
                    </option>

                </select>

            </td>

            <td>

                <input
                type="text"
                class="form-control keterangan"
                placeholder="Masukkan keterangan"
                >

            </td>

        </tr>

        `;

    });

}

/* SIMPAN ABSENSI */

function simpanAbsensi(){

    let kelas =
    document.getElementById("kelas").value;

    if(kelas == ""){

        alert("Pilih kelas");

        return;

    }

    let status =
    document.querySelectorAll(".status");

    let keterangan =
    document.querySelectorAll(".keterangan");

    let siswa =
    dataSiswa[kelas];

    siswa.forEach((nama,index)=>{

        let data = {

            tanggal :
            new Date()
            .toLocaleDateString(),

            kelas :
            "Kelas " + kelas,

            nama :
            nama,

            status :
            status[index].value,

            keterangan :
            keterangan[index].value

        };

        kirimGoogleSheet(data);

    });

    alert(
        "Absensi berhasil disimpan"
    );

}

/* KIRIM GOOGLE SHEET */

function kirimGoogleSheet(data){

    fetch(scriptURL,{

        method:"POST",

        body:JSON.stringify(data)

    })

    .then(res=>res.text())

    .then(res=>{

        console.log("Berhasil");

    })

    .catch(err=>{

        console.log(err);

    });

}

</script>

</body>
</html>
