<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Absensi Siswa</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{

    background:#f4f6f9;
    font-family:Arial;

}

/* SIDEBAR */

.sidebar{

    width:260px;
    height:100vh;

    background:#0d6efd;

    position:fixed;

    left:0;
    top:0;

    padding:20px;

    color:white;

}

.logo{

    text-align:center;
    margin-bottom:30px;

}

.menu a{

    display:flex;
    align-items:center;
    gap:12px;

    text-decoration:none;

    color:white;

    padding:14px;

    border-radius:12px;

    margin-bottom:10px;

    transition:0.3s;

}

.menu a:hover{

    background:rgba(255,255,255,0.2);

}

.menu a.active{

    background:white;
    color:#0d6efd;

}

/* CONTENT */

.content{

    margin-left:280px;
    padding:30px;

}

.card-box{

    background:white;

    border-radius:20px;

    padding:25px;

    box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

#reader{

    width:100%;

}

</style>

</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">

        <h2>SD SCHOOL</h2>

        <p>Administrasi Sekolah</p>

    </div>

    <div class="menu">

        <a href="dashboard.html">

            <i class="fa-solid fa-house"></i>
            Dashboard

        </a>

        <a href="datasiswa.html">

            <i class="fa-solid fa-user-graduate"></i>
            Data Siswa

        </a>

        <a href="dataguru.html">

            <i class="fa-solid fa-chalkboard-user"></i>
            Data Guru

        </a>

        <a href="absensi.html" class="active">

            <i class="fa-solid fa-camera"></i>
            Absensi

        </a>

        <a href="nilai.html">

            <i class="fa-solid fa-chart-column"></i>
            Nilai

        </a>

        <a href="barcode.html">

            <i class="fa-solid fa-qrcode"></i>
            Cetak Barcode

        </a>

        <a href="rekap.html">

            <i class="fa-solid fa-file-lines"></i>
            Rekap

        </a>

        <a href="pengaturan.html">

            <i class="fa-solid fa-gear"></i>
            Pengaturan

        </a>

    </div>

</div>

<!-- CONTENT -->

<div class="content">

    <div class="card-box">

        <h2 class="mb-4">
            Absensi Siswa
        </h2>

        <!-- PILIH KELAS -->

        <div class="mb-3">

            <label class="form-label">
                Pilih Kelas
            </label>

            <select
            id="kelas"
            class="form-select"
            >

                <option value="">
                    -- Pilih Kelas --
                </option>

                <option>Kelas 1</option>
                <option>Kelas 2</option>
                <option>Kelas 3</option>
                <option>Kelas 4</option>
                <option>Kelas 5</option>
                <option>Kelas 6</option>

            </select>

        </div>

        <!-- NAMA GURU -->

        <div class="mb-3">

            <label class="form-label">
                Nama Guru
            </label>

            <input
            type="text"
            id="guru"
            class="form-control"
            placeholder="Masukkan nama guru"
            >

        </div>

        <!-- TOMBOL -->

        <button
        class="btn btn-primary w-100 mb-4"
        onclick="mulaiAbsensi()"
        >

            Mulai Absensi

        </button>

        <!-- SCANNER -->

        <div id="reader"></div>

    </div>

</div>

<script>

const scriptURL =
'https://script.google.com/macros/s/AKfycbwicmFqIX_nvlchM0Jsjubk6EuUT1YkwdWtQViJK90hBbL94eseMpyZTCcevv-fzeM/exec';

let siswa = {

    "1001":"Ahmad",
    "1002":"Budi",
    "1003":"Citra",
    "1004":"Dewi"

};

let absensi = [];

function jam(){

    return new Date()
    .toLocaleTimeString();

}

function tanggal(){

    return new Date()
    .toLocaleDateString();

}

function mulaiAbsensi(){

    let kelas =
    document.getElementById("kelas").value;

    let guru =
    document.getElementById("guru").value;

    if(kelas == ""){

        alert("Pilih kelas");

        return;

    }

    if(guru == ""){

        alert("Masukkan nama guru");

        return;

    }

    const html5QrCode =
    new Html5Qrcode("reader");

    html5QrCode.start(

        { facingMode:"environment" },

        {
            fps:10,
            qrbox:250
        },

        (decodedText)=>{

            let nama =
            siswa[decodedText];

            if(!nama){

                alert("Siswa tidak ditemukan");

                return;

            }

            let sudah =
            absensi.find(
                x=>x.kode == decodedText
            );

            if(sudah){

                alert("Sudah absen");

                return;

            }

            let data = {

                no : absensi.length + 1,

                tanggal : tanggal(),

                kelas : kelas,

                guru : guru,

                nama : nama,

                jam : jam(),

                status : "Hadir"

            };

            absensi.push(data);

            kirimGoogleSheet(data);

            alert(
                nama +
                " berhasil absen"
            );

        }

    );

}

function kirimGoogleSheet(data){

    fetch(scriptURL,{

        method:"POST",

        body:JSON.stringify(data)

    })

    .then(res=>res.text())

    .then(res=>{

        console.log("Berhasil");

    })

    .catch(err=>{

        console.log(err);

    });

}

</script>

</body>
</html>
