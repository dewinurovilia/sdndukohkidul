<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Sekolah</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="style.css">

<style>

.sidebar{

    width:260px;
    height:100vh;
    background:#0d6efd;
    position:fixed;
    left:0;
    top:0;
    padding:20px;
    color:white;

}

.logo{

    text-align:center;
    margin-bottom:30px;

}

.menu{

    margin-top:20px;

}

.menu a{

    display:flex;
    align-items:center;
    gap:12px;

    text-decoration:none;
    color:white;

    padding:14px;
    border-radius:12px;

    margin-bottom:10px;

    transition:0.3s;

}

.menu a:hover{

    background:rgba(255,255,255,0.2);

}

.menu a.active{

    background:white;
    color:#0d6efd;

}

.content{

    margin-left:280px;
    padding:30px;

}

.topbar{

    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

.card-box{

    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

.number{

    font-size:35px;
    font-weight:bold;

}

</style>

</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">

        <h2>SD SCHOOL</h2>

        <p>Administrasi Sekolah</p>

    </div>

    <div class="menu">

        <a href="dashboard.html" class="active">

            <i class="fa-solid fa-house"></i>
            Dashboard

        </a>

        <a href="datasiswa.html">

            <i class="fa-solid fa-user-graduate"></i>
            Data Siswa

        </a>

        <a href="dataguru.html">

            <i class="fa-solid fa-chalkboard-user"></i>
            Data Guru

        </a>

        <a href="absensi.html">

            <i class="fa-solid fa-camera"></i>
            Absensi

        </a>

        <a href="nilai.html">

            <i class="fa-solid fa-chart-column"></i>
            Nilai

        </a>

        <a href="barcode.html">

            <i class="fa-solid fa-qrcode"></i>
            Cetak Barcode

        </a>

        <a href="rekap.html">

            <i class="fa-solid fa-file-lines"></i>
            Rekap

        </a>

        <a href="pengaturan.html">

            <i class="fa-solid fa-gear"></i>
            Pengaturan

        </a>

    </div>

</div>

<!-- CONTENT -->

<div class="content">

    <!-- TOPBAR -->

    <div class="topbar">

        <h3>
            Dashboard Sekolah
        </h3>

        <small>
            Selamat datang Admin
        </small>

    </div>

    <!-- STATISTIK -->

    <div class="row mt-4 g-4">

        <div class="col-md-3">

            <div class="card-box">

                <h6>Total Siswa</h6>

                <div class="number text-primary">
                    320
                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card-box">

                <h6>Hadir Hari Ini</h6>

                <div class="number text-success">
                    298
                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card-box">

                <h6>Total Guru</h6>

                <div class="number text-warning">
                    24
                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card-box">

                <h6>Alpha</h6>

                <div class="number text-danger">
                    5
                </div>

            </div>

        </div>

    </div>

    <!-- DATA -->

    <div class="card-box mt-4">

        <div class="d-flex justify-content-between">

            <h4>
                Data Absensi Hari Ini
            </h4>

            <button class="btn btn-primary">

                Lihat Semua

            </button>

        </div>

        <div class="table-responsive mt-3">

            <table class="table table-bordered">

                <thead>

                    <tr>

                        <th>No</th>
                        <th>Nama</th>
                        <th>Kelas</th>
                        <th>Status</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>1</td>
                        <td>Ahmad</td>
                        <td>5A</td>

                        <td>

                            <span class="badge bg-success">
                                Hadir
                            </span>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
