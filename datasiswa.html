<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Siswa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

body{

    background:#f4f6f9;
    font-family:Arial;

}

/* SIDEBAR */

.sidebar{

    width:260px;
    height:100vh;

    background:#0d6efd;

    position:fixed;

    left:0;
    top:0;

    padding:20px;

    color:white;

}

.logo{

    text-align:center;
    margin-bottom:30px;

}

.menu a{

    display:flex;
    align-items:center;
    gap:12px;

    text-decoration:none;

    color:white;

    padding:14px;

    border-radius:12px;

    margin-bottom:10px;

    transition:0.3s;

}

.menu a:hover{

    background:rgba(255,255,255,0.2);

}

.menu a.active{

    background:white;
    color:#0d6efd;

}

/* CONTENT */

.content{

    margin-left:280px;
    padding:30px;

}

.card-box{

    background:white;

    border-radius:20px;

    padding:25px;

    box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

</style>

</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">

        <h2>SD SCHOOL</h2>

        <p>Administrasi Sekolah</p>

    </div>

    <div class="menu">

        <a href="dashboard.html">

            <i class="fa-solid fa-house"></i>
            Dashboard

        </a>

        <a href="datasiswa.html" class="active">

            <i class="fa-solid fa-user-graduate"></i>
            Data Siswa

        </a>

        <a href="dataguru.html">

            <i class="fa-solid fa-chalkboard-user"></i>
            Data Guru

        </a>

        <a href="absensi.html">

            <i class="fa-solid fa-camera"></i>
            Absensi

        </a>

        <a href="nilai.html">

            <i class="fa-solid fa-chart-column"></i>
            Nilai

        </a>

        <a href="barcode.html">

            <i class="fa-solid fa-qrcode"></i>
            Cetak Barcode

        </a>

        <a href="rekap.html">

            <i class="fa-solid fa-file-lines"></i>
            Rekap

        </a>

        <a href="pengaturan.html">

            <i class="fa-solid fa-gear"></i>
            Pengaturan

        </a>

    </div>

</div>

<!-- CONTENT -->

<div class="content">

    <div class="card-box">

        <!-- HEADER -->

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h3>
                    Data Siswa
                </h3>

                <small>
                    Data seluruh siswa sekolah
                </small>

            </div>

            <button
            class="btn btn-danger"
            onclick="exportPDF()"
            >

                <i class="fa-solid fa-file-pdf"></i>
                Export PDF

            </button>

        </div>

        <!-- SEARCH -->

        <div class="row mb-4">

            <div class="col-md-4">

                <input
                type="text"
                class="form-control"
                placeholder="Cari siswa..."
                id="search"
                onkeyup="cariSiswa()"
                >

            </div>

        </div>

        <!-- TABLE -->

        <div class="table-responsive">

            <table
            class="table table-bordered table-hover"
            id="tableSiswa"
            >

                <thead class="table-primary">

                    <tr>

                        <th>No</th>
                        <th>Nama</th>
                        <th>Kelas</th>
                        <th>NIS</th>
                        <th>NISN</th>

                    </tr>

                </thead>

                <tbody id="tbody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

let siswa = [

    {

        nama:"Ahmad",
        kelas:"5A",
        nis:"1001",
        nisn:"99887766"

    },

    {

        nama:"Budi",
        kelas:"4B",
        nis:"1002",
        nisn:"99887767"

    },

    {

        nama:"Citra",
        kelas:"6A",
        nis:"1003",
        nisn:"99887768"

    }

];

function renderSiswa(data = siswa){

    let tbody =
    document.getElementById("tbody");

    tbody.innerHTML = "";

    data.forEach((item,index)=>{

        tbody.innerHTML += `

        <tr>

            <td>${index+1}</td>

            <td>${item.nama}</td>

            <td>${item.kelas}</td>

            <td>${item.nis}</td>

            <td>${item.nisn}</td>

        </tr>

        `;

    });

}

renderSiswa();

function cariSiswa(){

    let keyword =
    document.getElementById("search")
    .value
    .toLowerCase();

    let hasil =
    siswa.filter(item =>

        item.nama
        .toLowerCase()
        .includes(keyword)

    );

    renderSiswa(hasil);

}

function exportPDF(){

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    doc.text(

        "DATA SISWA",

        14,

        15

    );

    doc.autoTable({

        html:"#tableSiswa",

        startY:20

    });

    doc.save("data-siswa.pdf");

}

</script>

</body>
</html>
