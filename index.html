<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INPUT NILAI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container py-4">

    <div class="card p-4">

        <h2 class="mb-4 text-center">
            INPUT NILAI SISWA
        </h2>

        <!-- PILIH KELAS -->

        <div class="mb-3">

            <label class="form-label">
                Pilih Kelas
            </label>

            <select
                id="kelas"
                class="form-select"
                onchange="loadSiswa()"
            >

                <option value="">
                    -- Pilih Kelas --
                </option>

                <option value="1">
                    Kelas 1
                </option>

                <option value="2">
                    Kelas 2
                </option>

                <option value="3">
                    Kelas 3
                </option>

                <option value="4">
                    Kelas 4
                </option>

                <option value="5">
                    Kelas 5
                </option>

                <option value="6">
                    Kelas 6
                </option>

            </select>

        </div>

        <!-- PILIH SISWA -->

        <div class="mb-3">

            <label class="form-label">
                Pilih Siswa
            </label>

            <select
                id="siswa"
                class="form-select"
            >

                <option>
                    -- Pilih Siswa --
                </option>

            </select>

        </div>

        <!-- MATA PELAJARAN -->

        <div class="mb-3">

            <label class="form-label">
                Mata Pelajaran
            </label>

            <select
                id="mapel"
                class="form-select"
            >

                <option>Matematika</option>
                <option>Bahasa Indonesia</option>
                <option>IPA</option>
                <option>IPS</option>
                <option>PPKN</option>
                <option>SBdP</option>

            </select>

        </div>

        <!-- NILAI -->

        <div class="mb-3">

            <label class="form-label">
                Nilai (0 - 100)
            </label>

            <input
                type="number"
                id="nilai"
                class="form-control"
                min="0"
                max="100"
                placeholder="Masukkan nilai"
            >

        </div>

        <button
            class="btn btn-success w-100"
            onclick="simpanNilai()"
        >
            Simpan Nilai
        </button>

    </div>

    <!-- TABEL -->

    <div class="card p-4 mt-4">

        <h3 class="mb-3">
            Data Nilai
        </h3>

        <div class="table-responsive">

            <table class="table table-bordered">

                <thead>

                    <tr>

                        <th>No</th>
                        <th>Kelas</th>
                        <th>Siswa</th>
                        <th>Mapel</th>
                        <th>Nilai</th>

                    </tr>

                </thead>

                <tbody id="tbody"></tbody>

            </table>

        </div>

    </div>

</div>

<script src="nilai.js"></script>

</body>
</html>
