<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABSENSI SD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>
<body>

<div class="container py-4">

    <div class="text-center mb-4">

        <h1 class="title">
            ABSENSI BARCODE SD NEGERI DUKOHKIDUL
        </h1>

        <p>Kelas 1 - 6</p>

    </div>

    <div class="row">

        <!-- SCANNER -->

        <div class="col-lg-5 mb-4">

            <div class="card p-3">

                <h4>Scan Barcode</h4>

                <select id="kelas" class="form-select mb-3">

                    <option>Kelas 1</option>
                    <option>Kelas 2</option>
                    <option>Kelas 3</option>
                    <option>Kelas 4</option>
                    <option>Kelas 5</option>
                    <option>Kelas 6</option>

                </select>

                <div id="reader"></div>

                <button
                    class="btn btn-primary w-100 mt-3"
                    onclick="mulaiScan()"
                >
                    Mulai Scan
                </button>

            </div>

        </div>

        <!-- ABSENSI -->

        <div class="col-lg-7">

            <div class="card p-3">

                <div class="d-flex justify-content-between">

                    <h4>Data Absensi</h4>

                    <button
                        class="btn btn-danger btn-sm"
                        onclick="resetAbsensi()"
                    >
                        Reset
                    </button>

                </div>

                <div class="table-responsive mt-3">

                    <table class="table table-bordered">

                        <thead>

                            <tr>

                                <th>No</th>
                                <th>Nama</th>
                                <th>Kelas</th>
                                <th>Jam</th>
                                <th>Status</th>

                            </tr>

                        </thead>

                        <tbody id="tbody"></tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- NILAI -->

    <div class="card p-3 mt-4">

        <h4>Nilai Harian</h4>

        <div class="row mt-2">

            <div class="col-md-3 mb-2">

                <input
                    type="text"
                    id="nama"
                    class="form-control"
                    placeholder="Nama siswa"
                >

            </div>

            <div class="col-md-2 mb-2">

                <input
                    type="number"
                    id="tugas"
                    class="form-control"
                    placeholder="Tugas"
                >

            </div>

            <div class="col-md-2 mb-2">

                <input
                    type="number"
                    id="ulangan"
                    class="form-control"
                    placeholder="Ulangan"
                >

            </div>

            <div class="col-md-2 mb-2">

                <input
                    type="number"
                    id="praktik"
                    class="form-control"
                    placeholder="Praktik"
                >

            </div>

            <div class="col-md-3 mb-2">

                <button
                    class="btn btn-success w-100"
                    onclick="simpanNilai()"
                >
                    Simpan
                </button>

            </div>

        </div>

        <div class="table-responsive mt-4">

            <table class="table table-bordered">

                <thead>

                    <tr>

                        <th>No</th>
                        <th>Nama</th>
                        <th>Tugas</th>
                        <th>Ulangan</th>
                        <th>Praktik</th>
                        <th>Rata-rata</th>

                    </tr>

                </thead>

                <tbody id="nilaiBody"></tbody>

            </table>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
