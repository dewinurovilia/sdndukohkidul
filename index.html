<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABSENSI SD BARCODE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.title{
    color:#0d6efd;
    font-weight:bold;
}

#reader{
    width:100%;
}

</style>
</head>
<body>

<div class="container py-4">

    <div class="text-center mb-4">
        <h1 class="title">ABSENSI BARCODE SD</h1>
        <p>Kelas 1 - 6</p>
    </div>

    <div class="row">

        <!-- SCAN -->
        <div class="col-lg-5 mb-4">

            <div class="card p-3">

                <h4>Scan Barcode</h4>

                <select id="kelas" class="form-select mb-3">
                    <option>Kelas 1</option>
                    <option>Kelas 2</option>
                    <option>Kelas 3</option>
                    <option>Kelas 4</option>
                    <option>Kelas 5</option>
                    <option>Kelas 6</option>
                </select>

                <div id="reader"></div>

                <button class="btn btn-primary w-100 mt-3" onclick="mulaiScan()">
                    Mulai Scan
                </button>

            </div>

        </div>

        <!-- ABSENSI -->
        <div class="col-lg-7">

            <div class="card p-3">

                <div class="d-flex justify-content-between">

                    <h4>Data Absensi</h4>

                    <button class="btn btn-danger btn-sm" onclick="resetAbsensi()">
                        Reset
                    </button>

                </div>

                <div class="table-responsive mt-3">

                    <table class="table table-bordered">

                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Nama</th>
                                <th>Kelas</th>
                                <th>Jam</th>
                                <th>Status</th>
                            </tr>
                        </thead>

                        <tbody id="tbody"></tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- NILAI -->

    <div class="card p-3 mt-4">

        <h4>Nilai Harian</h4>

        <div class="row mt-2">

            <div class="col-md-3 mb-2">
                <input type="text" id="nama" class="form-control" placeholder="Nama siswa">
            </div>

            <div class="col-md-2 mb-2">
                <input type="number" id="tugas" class="form-control" placeholder="Tugas">
            </div>

            <div class="col-md-2 mb-2">
                <input type="number" id="ulangan" class="form-control" placeholder="Ulangan">
            </div>

            <div class="col-md-2 mb-2">
                <input type="number" id="praktik" class="form-control" placeholder="Praktik">
            </div>

            <div class="col-md-3 mb-2">
                <button class="btn btn-success w-100" onclick="simpanNilai()">
                    Simpan
                </button>
            </div>

        </div>

        <div class="table-responsive mt-4">

            <table class="table table-bordered">

                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Tugas</th>
                        <th>Ulangan</th>
                        <th>Praktik</th>
                        <th>Rata-rata</th>
                    </tr>
                </thead>

                <tbody id="nilaiBody"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

let siswa = {

    "1001":"Ahmad",
    "1002":"Budi",
    "1003":"Citra",
    "1004":"Dewi"

};

let absensi = [];
let nilai = [];

function jam(){

    return new Date().toLocaleTimeString();

}

function renderAbsensi(){

    let tbody = document.getElementById("tbody");

    tbody.innerHTML = "";

    absensi.forEach((item,index)=>{

        tbody.innerHTML += `

        <tr>
            <td>${index+1}</td>
            <td>${item.nama}</td>
            <td>${item.kelas}</td>
            <td>${item.jam}</td>
            <td>
                <span class="badge bg-success">
                    Hadir
                </span>
            </td>
        </tr>

        `;

    });

}

function mulaiScan(){

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(

        { facingMode:"environment" },

        {
            fps:10,
            qrbox:250
        },

        (decodedText)=>{

            let nama = siswa[decodedText];

            if(!nama){

                alert("Siswa tidak ditemukan");

                return;
            }

            let sudah = absensi.find(x=>x.kode == decodedText);

            if(sudah){

                alert("Sudah absen");

                return;
            }

            absensi.push({

                kode:decodedText,
                nama:nama,
                kelas:document.getElementById("kelas").value,
                jam:jam()

            });

            renderAbsensi();

            bunyi();

        }

    );

}

function bunyi(){

    let audio = new Audio(
        "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
    );

    audio.play();

}

function resetAbsensi(){

    absensi = [];

    renderAbsensi();

}

function simpanNilai(){

    let nama = document.getElementById("nama").value;

    let tugas = Number(document.getElementById("tugas").value);

    let ulangan = Number(document.getElementById("ulangan").value);

    let praktik = Number(document.getElementById("praktik").value);

    let rata = (tugas + ulangan + praktik) / 3;

    nilai.push({

        nama,
        tugas,
        ulangan,
        praktik,
        rata

    });

    renderNilai();

    document.getElementById("nama").value = "";
    document.getElementById("tugas").value = "";
    document.getElementById("ulangan").value = "";
    document.getElementById("praktik").value = "";

}

function renderNilai(){

    let body = document.getElementById("nilaiBody");

    body.innerHTML = "";

    nilai.forEach((n,index)=>{

        body.innerHTML += `

        <tr>

            <td>${index+1}</td>
            <td>${n.nama}</td>
            <td>${n.tugas}</td>
            <td>${n.ulangan}</td>
            <td>${n.praktik}</td>
            <td>${n.rata.toFixed(1)}</td>

        </tr>

        `;

    });

}

</script>

</body>
</html>
