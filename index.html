<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WEB SEKOLAH SD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="title">
            WEB SEKOLAH SD
        </h1>

        <p>
            Sistem Absensi Barcode & Nilai Harian
        </p>

    </div>

    <div class="row justify-content-center g-4">

        <!-- MENU ABSEN -->

        <div class="col-md-5">

            <div class="card menu-card p-4 text-center">

                <h2>
                    ABSEN SISWA
                </h2>

                <p>
                    Scan barcode kehadiran siswa
                </p>

                <button
                    class="btn btn-primary w-100"
                    data-bs-toggle="modal"
                    data-bs-target="#modalAbsen"
                >
                    Masuk Absen
                </button>

            </div>

        </div>

        <!-- MENU NILAI -->

        <div class="col-md-5">

            <div class="card menu-card p-4 text-center">

                <h2>
                    INPUT NILAI
                </h2>

                <p>
                    Input nilai harian siswa
                </p>

                <button
                    class="btn btn-success w-100"
                    onclick="bukaNilai()"
                >
                    Input Nilai
                </button>

            </div>

        </div>

    </div>

</div>

<!-- MODAL ABSEN -->

<div class="modal fade" id="modalAbsen">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Mulai Absensi
                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal"
                ></button>

            </div>

            <div class="modal-body">

                <label class="mb-2">
                    Pilih Kelas
                </label>

                <select
                    id="kelas"
                    class="form-select mb-3"
                >

                    <option value="">
                        -- Pilih Kelas --
                    </option>

                    <option>Kelas 1</option>
                    <option>Kelas 2</option>
                    <option>Kelas 3</option>
                    <option>Kelas 4</option>
                    <option>Kelas 5</option>
                    <option>Kelas 6</option>

                </select>

                <label class="mb-2">
                    Nama Guru Kelas
                </label>

                <input
                    type="text"
                    id="guru"
                    class="form-control"
                    placeholder="Masukkan nama guru"
                >

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-primary w-100"
                    onclick="mulaiAbsen()"
                >
                    Mulai Absensi
                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
